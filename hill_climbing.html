<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hill Climbing Simulator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
        }
        canvas {
            background-color: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-top: 15px;
            max-width: 100%;
        }
        .controls {
            margin-top: 15px;
        }
        button {
            padding: 10px 18px;
            font-size: 14px;
            cursor: pointer;
            margin: 0 8px;
            border: none;
            border-radius: 6px;
            background-color: #0366d6;
            color: white;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #005cc5;
        }
        button:disabled {
            background-color: #959da5;
            cursor: not-allowed;
        }
        #status {
            margin-top: 15px;
            font-size: 16px;
            font-weight: 600;
            color: #24292e;
            height: 24px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="restartBtn" onclick="randomRestart()">Random Restart (隨機起點)</button>
        <button id="startBtn" onclick="startAscent()">Start Ascent (開始攀登)</button>
    </div>
    <div id="status">準備就緒</div>
    <canvas id="simCanvas" width="700" height="350"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');

        // 定義地形函數 (Objective Function)
        // 設計為擁有一個局部最大值 (左側) 與全域最大值 (右側)
        function f(x) {
            return Math.sin(x) + 0.6 * Math.sin(2.5 * x) + 0.3 * x;
        }

        // 函數的導數 (Gradient)，用於決定攀登方向
        function df(x) {
            return Math.cos(x) + 1.5 * Math.cos(2.5 * x) + 0.3;
        }

        const xMin = 0;
        const xMax = 6;
        let agentX = 0;
        let isAnimating = false;
        let animationId;

        // 座標轉換 (將數學座標轉為 Canvas 像素)
        function mapX(x) { return (x / xMax) * canvas.width; }
        function mapY(y) { 
            // 翻轉 Y 軸並縮放
            return canvas.height - ((y + 1.5) / 5) * canvas.height; 
        }

        function drawTerrain() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = '#28a745';
            ctx.lineWidth = 4;
            
            for (let px = 0; px <= canvas.width; px++) {
                let x = (px / canvas.width) * xMax;
                let y = f(x);
                if (px === 0) ctx.moveTo(px, mapY(y));
                else ctx.lineTo(px, mapY(y));
            }
            ctx.stroke();
        }

        function drawAgent() {
            let px = mapX(agentX);
            let py = mapY(f(agentX));
            
            ctx.beginPath();
            ctx.arc(px, py, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#d73a49';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function updateFrame() {
            drawTerrain();
            drawAgent();
        }

        function randomRestart() {
            if (isAnimating) cancelAnimationFrame(animationId);
            isAnimating = false;
            startBtn.disabled = false;
            
            // 隨機生成 0.5 到 5.5 之間的起點
            agentX = 0.5 + Math.random() * 5;
            statusDiv.innerText = "已隨機放置起點，準備攀登！";
            statusDiv.style.color = "#24292e";
            updateFrame();
        }

        function startAscent() {
            if (isAnimating) return;
            isAnimating = true;
            startBtn.disabled = true;
            statusDiv.innerText = "攀登中... (Gradient Ascent)";
            statusDiv.style.color = "#0366d6";
            
            const learningRate = 0.05; // 步長 (Step size)
            
            function step() {
                let gradient = df(agentX);
                
                // 如果梯度接近 0，代表到達頂峰
                if (Math.abs(gradient) < 0.01) {
                    isAnimating = false;
                    // 根據 X 座標判斷是局部還是全域最大值
                    if (agentX < 3) {
                        statusDiv.innerText = "🚩 卡在局部最大值 (Stuck in Local Maximum)";
                        statusDiv.style.color = "#d73a49";
                    } else {
                        statusDiv.innerText = "🏆 抵達全域最大值 (Global Maximum Reached!)";
                        statusDiv.style.color = "#28a745";
                    }
                    return;
                }

                // 更新位置：朝著梯度的方向前進
                agentX += gradient * learningRate;
                
                // 邊界限制
                if (agentX < xMin) agentX = xMin;
                if (agentX > xMax) agentX = xMax;

                updateFrame();
                animationId = requestAnimationFrame(step);
            }
            
            step();
        }

        // 初始化
        randomRestart();
    </script>
</body>
</html>
